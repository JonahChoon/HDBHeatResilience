<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HDB Heat Resilience · Field Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #eceae5;
      --panel: #f8f6f2;
      --navy: #1c2b4a;
      --accent: #c94a1e;
      --grid: #dedad2;
      --text: #1a1a1a;
      --muted: #8a8580;
      --before: #2a7de8;
      --during: #c94a1e;
      --after: #22a060;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--navy);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      background: var(--accent);
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      flex-grow: 1;
    }

    .header h1 small {
      display: block;
      color: #8fa3cc;
      font-weight: 400;
      font-size: 14px;
      margin-top: 4px;
    }

    /* PHASE BAR */
    .phase-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--grid);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .phase-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .phase-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .phase-btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 24px;
      border: 1.5px solid var(--grid);
      background: white;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .phase-btn[data-phase="before"]:hover,
    .phase-btn[data-phase="before"].active {
      background: var(--before);
      border-color: var(--before);
      color: white;
    }

    .phase-btn[data-phase="during"]:hover,
    .phase-btn[data-phase="during"].active {
      background: var(--during);
      border-color: var(--during);
      color: white;
    }

    .phase-btn[data-phase="after"]:hover,
    .phase-btn[data-phase="after"].active {
      background: var(--after);
      border-color: var(--after);
      color: white;
    }

    .unit-select {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1.5px solid var(--grid);
      background: white;
      color: var(--text);
      cursor: pointer;
      margin-left: auto;
    }

    .unit-select.required {
      border-color: #e88;
      background: #fff5f5;
    }

    /* WORKSPACE */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* LEFT: DRAG-DROP */
    .left-pane {
      width: 50%;
      flex-shrink: 0;
      display: flex;
      border-right: 2px solid var(--grid);
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 140px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--grid);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--grid);
      text-align: center;
    }

    .sidebar-select-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      margin-top: 6px;
    }

    .sidebar-select {
      width: 100%;
      font-size: 15px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--grid);
      font-family: inherit;
      background: white;
    }

    .appliance-slot {
      width: 110px;
      height: 94px;
      border-radius: 10px;
      border: 1.5px dashed #ccc;
      background: #f0ede8;
      flex-shrink: 0;
      margin: 0 auto;
    }

    /* STATUS */
    .drag-status {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }

    .combo-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 24px;
      background: #e8ecf5;
      border: 1px solid #c0cce0;
      color: var(--navy);
      transition: all .3s;
      white-space: nowrap;
    }

    .combo-tag.active {
      background: #fff3cd;
      border-color: #f5a623;
      color: #7a4a00;
    }

    .combo-tag.invalid {
      background: #fde8e8;
      border-color: #e88;
      color: #900;
    }

    /* BLUEPRINT */
    .blueprint-wrap {
      flex: 1;
      position: relative;
      background: linear-gradient(rgba(160, 155, 145, .15) 1px, transparent 1px), linear-gradient(90deg, rgba(160, 155, 145, .15) 1px, transparent 1px), #f0ede8;
      background-size: 24px 24px;
      overflow: hidden;
    }

    .blueprint-wrap.over-drop {
      outline: 4px dashed rgba(74, 125, 232, .4);
      outline-offset: -8px;
    }

    .fp-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      max-height: 94%;
      max-width: 94%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15);
    }

    .fp-img.active {
      display: block;
    }

    /* APPLIANCE CHIPS */
    .appliance {
      width: 110px;
      height: 94px;
      border-radius: 10px;
      border: 2px solid #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: grab;
      position: absolute;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .12);
      transition: box-shadow .15s, transform .15s;
      z-index: 10;
      padding: 8px;
      background: white;
    }

    .appliance:active {
      cursor: grabbing;
    }
