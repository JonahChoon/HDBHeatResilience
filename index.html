<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HDB Heat Resilience · Field Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #eceae5;
      --panel: #f8f6f2;
      --navy: #1c2b4a;
      --accent: #c94a1e;
      --grid: #dedad2;
      --text: #1a1a1a;
      --muted: #8a8580;
      --before: #2a7de8;
      --during: #c94a1e;
      --baseline: #8b5cf6;
      --after: #22a060;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      background: var(--navy);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      background: var(--accent);
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      flex-grow: 1;
    }

    .header h1 small {
      display: block;
      color: #8fa3cc;
      font-weight: 400;
      font-size: 14px;
      margin-top: 4px;
    }

    /* PHASE BAR */
    .phase-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--grid);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .phase-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .phase-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .phase-btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 24px;
      border: 1.5px solid var(--grid);
      background: white;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .phase-btn[data-phase="before"]:hover,
    .phase-btn[data-phase="before"].active {
      background: var(--before);
      border-color: var(--before);
      color: white;
    }

    .phase-btn[data-phase="baseline"]:hover,
    .phase-btn[data-phase="baseline"].active {
      background: var(--baseline);
      border-color: var(--baseline);
      color: white;
    }

    .phase-btn[data-phase="during"]:hover,
    .phase-btn[data-phase="during"].active {
      background: var(--during);
      border-color: var(--during);
      color: white;
    }

    .phase-btn[data-phase="after"]:hover,
    .phase-btn[data-phase="after"].active {
      background: var(--after);
      border-color: var(--after);
      color: white;
    }

    .unit-select {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1.5px solid var(--grid);
      background: white;
      color: var(--text);
      cursor: pointer;
      margin-left: auto;
    }

    .unit-select.required {
      border-color: #e88;
      background: #fff5f5;
    }

    /* WORKSPACE */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* LEFT: DRAG-DROP */
    .left-pane {
      width: 50%;
      flex-shrink: 0;
      display: flex;
      border-right: 2px solid var(--grid);
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 140px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--grid);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--grid);
      text-align: center;
    }

    .sidebar-select-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      margin-top: 6px;
    }

    .sidebar-select {
      width: 100%;
      font-size: 15px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--grid);
      font-family: inherit;
      background: white;
    }

    .sidebar-select:disabled {
      opacity: 1;
      color: var(--navy);
      background: #e8ecf5;
      cursor: not-allowed;
      font-weight: 600;
    }

    .appliance-slot {
      width: 110px;
      height: 94px;
      border-radius: 10px;
      border: 1.5px dashed #ccc;
      background: #f0ede8;
      flex-shrink: 0;
      margin: 0 auto;
    }

    /* STATUS */
    .drag-status {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }

    .combo-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 24px;
      background: #e8ecf5;
      border: 1px solid #c0cce0;
      color: var(--navy);
      transition: all .3s;
      white-space: nowrap;
    }

    .combo-tag.active {
      background: #fff3cd;
      border-color: #f5a623;
      color: #7a4a00;
    }

    .combo-tag.invalid {
      background: #fde8e8;
      border-color: #e88;
      color: #900;
    }

    /* BLUEPRINT */
    .blueprint-wrap {
      flex: 1;
      position: relative;
      background: linear-gradient(rgba(160, 155, 145, .15) 1px, transparent 1px), linear-gradient(90deg, rgba(160, 155, 145, .15) 1px, transparent 1px), #f0ede8;
      background-size: 24px 24px;
      overflow: hidden;
    }

    .blueprint-wrap.over-drop {
      outline: 4px dashed rgba(74, 125, 232, .4);
      outline-offset: -8px;
    }

    .fp-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      max-height: 94%;
      max-width: 94%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15);
    }

    .fp-img.active {
      display: block;
    }

    /* APPLIANCE CHIPS */
    .appliance {
      width: 110px;
      height: 94px;
      border-radius: 10px;
      border: 2px solid #ddd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: grab;
      position: absolute;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .12);
      transition: box-shadow .15s, transform .15s;
      z-index: 10;
      padding: 8px;
      background: white;
    }

    .appliance:active {
      cursor: grabbing;
    }

    .appliance.dragging {
      box-shadow: 0 8px 28px rgba(0, 0, 0, .22);
      transform: scale(1.05) rotate(1deg);
      z-index: 9999;
    }

    .appliance.placed {
      box-shadow: 0 3px 14px rgba(0, 0, 0, .20);
    }

    .appliance img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
    }

    .appliance-name {
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      line-height: 1.2;
      color: #333;
    }

    #SF {
      border-color: #f5a623;
      background: #fff8e7;
    }

    #CF {
      border-color: #4a7de8;
      background: #e8f0ff;
    }

    #AC {
      border-color: #22c480;
      background: #e8faf4;
    }

    #WEF {
      border-color: #9b59f5;
      background: #f3e8ff;
    }

    #SEAT {
      border-color: #c09b7d;
      background: #faede3;
    }

    #SENSOR {
      border-color: #607d8b;
      background: #eceff1;
    }

    /* RIGHT PANE */
    .right-pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
    }

    .right-inner {
      flex: 1;
      overflow-y: auto;
      padding: 24px 30px;
      display: flex;
      flex-direction: column;
    }

    /* GATE MESSAGES */
    .gate-msg,
    .phase-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      color: var(--muted);
      text-align: center;
      padding: 30px;
    }

    .gate-msg .gate-icon,
    .phase-prompt .gate-icon {
      font-size: 52px;
    }

    .gate-msg p,
    .phase-prompt p {
      font-size: 18px;
      line-height: 1.5;
    }

    /* SECTION HEADERS */
    .q-section-header {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      margin: 20px 0 12px;
    }

    .q-section-header:first-child {
      margin-top: 0;
    }

    .q-section-header.before {
      background: var(--before);
    }

    .q-section-header.baseline {
      background: var(--baseline);
    }

    .q-section-header.during {
      background: var(--during);
    }

    .q-section-header.after {
      background: var(--after);
    }

    /* SUB-SECTION HEADERS */
    .q-sub-section {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--navy);
      padding: 8px 14px;
      border-radius: 4px;
      background: #e8ecf5;
      margin: 18px 0 10px;
    }

    /* QUESTION BLOCKS */
    .q-block-right {
      margin-bottom: 24px;
    }

    .q-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .q-hint {
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
    }

    .q-input {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1.5px solid var(--grid);
      background: white;
      width: 100%;
      color: var(--text);
    }

    .q-input:focus {
      outline: none;
      border-color: #8fa3cc;
    }

    textarea.q-input {
      resize: vertical;
      min-height: 90px;
    }

    .q-pair {
      display: flex;
      gap: 16px;
    }

    .q-pair .q-input {
      flex: 1;
    }

    .q-pair-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* Chips */
    .q-options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .q-chip {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      padding: 10px 18px;
      border-radius: 24px;
      border: 1.5px solid var(--grid);
      background: white;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }

    .q-chip:hover {
      border-color: #a0a8c0;
      background: #f0f2f8;
    }

    .q-chip.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .q-chip.disabled:hover {
      border-color: var(--grid);
      background: white;
    }

    .appliance.auto-locked {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.35);
    }

    .q-chip.sel-before {
      background: var(--before);
      border-color: var(--before);
      color: white;
    }

    .q-chip.sel-baseline {
      background: var(--baseline);
      border-color: var(--baseline);
      color: white;
    }

    .q-chip.sel-during {
      background: var(--during);
      border-color: var(--during);
      color: white;
    }

    .q-chip.sel-after {
      background: var(--after);
      border-color: var(--after);
      color: white;
    }

    /* Door & Window Configuration Grid */
    .window-config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 16px 18px;
    }

    .window-config-card {
      background: white;
      border: 1.5px solid var(--grid);
      border-radius: 8px;
      padding: 14px;
    }

    @media (max-width: 900px) {
      .window-config-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Sub-groups */
    .q-sub-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .q-sub-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
    }

    /* Other specify */
    .other-input {
      display: none;
      margin-top: 10px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1.5px solid var(--grid);
      background: white;
      width: 100%;
    }

    .other-input.visible {
      display: block;
    }

    /* Combo banner */
    .combo-banner {
      background: #fff8e7;
      border: 1.5px solid #f5a623;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      color: #7a4a00;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .combo-banner span {
      font-weight: 500;
    }

    /* Temp fields */
    .temp-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .temp-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 140px;
    }

    .temp-field label {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .temp-input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1.5px solid var(--grid);
      background: white;
      width: 100%;
      color: var(--text);
      text-align: center;
    }

    .temp-input:focus {
      outline: none;
      border-color: #8fa3cc;
    }

    /* TCV scale */
    .tcv-scale {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tcv-chip {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--grid);
      background: white;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .tcv-chip .tcv-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      font-weight: 700;
    }

    .tcv-chip .tcv-lbl {
      font-size: 13px;
      color: var(--muted);
    }

    .tcv-chip:hover {
      border-color: #a0a8c0;
    }

    .tcv-chip.sel-during {
      background: var(--during);
      border-color: var(--during);
      color: white;
    }

    .tcv-chip.sel-during .tcv-lbl {
      color: rgba(255, 255, 255, .7);
    }

    .tcv-chip.sel-baseline {
      background: var(--baseline);
      border-color: var(--baseline);
      color: white;
    }

    .tcv-chip.sel-baseline .tcv-lbl {
      color: rgba(255, 255, 255, .7);
    }

    /* Scale chips for numbered ratings */
    .scale-chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 16px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--grid);
      background: white;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .scale-chip .sc-num {
      font-size: 16px;
      font-weight: 700;
    }

    .scale-chip .sc-lbl {
      font-size: 13px;
      color: var(--muted);
    }

    .scale-chip:hover {
      border-color: #a0a8c0;
    }

    .scale-chip.sel-during {
      background: var(--during);
      border-color: var(--during);
      color: white;
    }

    .scale-chip.sel-during .sc-lbl {
      color: rgba(255, 255, 255, .7);
    }

    .scale-chip.sel-baseline {
      background: var(--baseline);
      border-color: var(--baseline);
      color: white;
    }

    .scale-chip.sel-baseline .sc-lbl {
      color: rgba(255, 255, 255, .7);
    }

    /* Placement image chips */
    .placement-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .placement-chip {
      border: 2px solid var(--grid);
      border-radius: 8px;
      padding: 12px 18px;
      cursor: pointer;
      background: white;
      transition: all .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .placement-chip:hover {
      border-color: #a0a8c0;
      background: #f0f2f8;
    }

    .placement-chip.sel-before {
      border-color: var(--before);
      background: #e8f0ff;
    }

    .placement-chip.sel-during {
      border-color: var(--during);
      background: #fff1e8;
    }

    .placement-chip.sel-baseline {
      border-color: var(--baseline);
      background: #f3e8ff;
    }

    .placement-chip.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .placement-chip .pl-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
    }

    .placement-chip .pl-emoji {
      font-size: 30px;
    }

    /* Need rating scale (0-10) */
    .need-scale {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .need-chip {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      width: 52px;
      height: 52px;
      border-radius: 8px;
      border: 1.5px solid var(--grid);
      background: white;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .need-chip .nc-num {
      font-size: 16px;
      font-weight: 700;
    }

    .need-chip:hover {
      border-color: #a0a8c0;
      background: #f0f2f8;
    }

    .need-chip.sel-during {
      background: var(--during);
      border-color: var(--during);
      color: white;
    }

    hr.q-divider {
      border: none;
      border-top: 1px solid var(--grid);
      margin: 14px 0 20px;
    }

    /* Footer */
    .right-footer {
      padding: 16px 30px;
      border-top: 1px solid var(--grid);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
      background: var(--panel);
    }

    .btn-reset {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 16px;
      background: white;
      border: 1px solid var(--grid);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-reset:hover {
      background: #f0ede8;
    }

    .btn-submit {
      background: var(--accent);
      color: white;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 18px;
      padding: 12px 28px;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-submit:hover {
      background: #a83a10;
    }

    .btn-submit:disabled {
      background: #8a8580;
      cursor: not-allowed;
    }

    /* ============================================================
       COMPACT MODE
    ============================================================ */

    body {
      font-size: 14px;
    }

    .header {
      padding: 10px 18px;
    }

    .logo {
      width: 36px;
      height: 36px;
      font-size: 13px;
    }

    .header h1 {
      font-size: 17px;
    }

    .header h1 small {
      font-size: 12px;
      margin-top: 2px;
    }

    .phase-bar {
      padding: 8px 16px;
      gap: 12px;
    }

    .phase-label {
      font-size: 12px;
    }

    .phase-btn {
      font-size: 14px;
      padding: 8px 14px;
    }

    .unit-select {
      font-size: 14px;
      padding: 8px 12px;
    }

    .sidebar {
      width: 120px;
      padding: 12px 8px;
      gap: 9px;
    }

    .sidebar-title {
      font-size: 12px;
    }

    .sidebar-select-label {
      font-size: 12px;
    }

    .sidebar-select {
      font-size: 13px;
      padding: 6px;
    }

    .appliance-slot {
      width: 92px;
      height: 78px;
    }

    .appliance {
      width: 92px;
      height: 78px;
      padding: 6px;
      gap: 4px;
    }

    .appliance img {
      width: 36px;
      height: 36px;
    }

    /* ============================================================

<body>

  <div class="header">
    <div class="logo"><img src="HDB LOGo.png" style="width:40px"></div>
    <h1>Heat Resilience Dashboard <small>Phase 2 · Field Study</small></h1>
  </div>

  <!-- PHASE + UNIT BAR -->
  <div class="phase-bar">
    <span class="phase-label">Phase:</span>
    <div class="phase-btns">
      <button class="phase-btn" data-phase="before" onclick="setPhase('before')">① Before Experiment</button>
      <button class="phase-btn" data-phase="baseline" onclick="setPhase('baseline')">② Baseline</button>
      <button class="phase-btn" data-phase="during" onclick="setPhase('during')">② Intervention</button>
      <button class="phase-btn" data-phase="after" onclick="setPhase('after')">③ After All Experiments</button>
    </div>
    <select class="unit-select" id="unitNumber" onchange="onUnitChange()">
      <option value="" disabled selected>Select Unit…</option>
      <option value="#17-127">#17-127 · 2R</option>
      <option value="#17-115">#17-115 · 1R</option>
      <option value="#15-125">#15-125 · 2R</option>
      <option value="#15-117">#15-117 · 1R</option>
      <option value="#13-105">#13-105 · 2R</option>
      <option value="#12-119">#12-119 · 2R</option>
      <option value="#12-107">#12-107 · 2R</option>
      <option value="#07-141">#07-141 · 2R</option>
      <option value="#07-131">#07-131 · 1R</option>
      <option value="#07-137">#07-137 · 1R</option>
      <option value="#07-139">#07-139 · 1R</option>
      <option value="#03-125">#03-125 · 2R</option>
    </select>
  </div>

  <!-- MOBILE: SHOW / HIDE LAYOUT PANEL -->
  <div class="mobile-layout-toggle">
    <button class="mobile-layout-btn" id="mobileLayoutBtn" onclick="toggleMobileLayout()">☰ Show Layout</button>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">

    <!-- LEFT: DRAG-DROP -->
    <div class="left-pane">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-title">Drag to plan</div>
        <span class="sidebar-select-label">Floorplan (Auto):</span>
        <select class="sidebar-select" id="layoutSelector" onchange="changeLayout()" disabled
          title="Auto-selected based on selected unit number">
          <option value="1 Room">1-Room</option>
          <option value="2 Room">2-Room</option>
        </select>
        <div style="height:10px;border-bottom:1px solid var(--grid);margin-bottom:8px;"></div>
        <div class="appliance-slot" id="slot-SF"></div>
        <div class="appliance-slot" id="slot-CF"></div>
        <div class="appliance-slot" id="slot-AC"></div>
        <div class="appliance-slot" id="slot-WEF"></div>
        <div style="height:10px;border-bottom:1px solid var(--grid);margin-bottom:8px;"></div>
        <div class="appliance-slot" id="slot-SEAT"></div>
        <div class="appliance-slot" id="slot-SENSOR"></div>
      </div>
      <div class="blueprint-wrap" id="blueprintWrap">
        <img class="fp-img active" id="fp-1rm" src="1 Room.png" alt="1-Room floorplan" />
        <img class="fp-img" id="fp-2rm" src="2 Room.png" alt="2-Room floorplan" />
        <div class="drag-status">
          <div class="combo-tag" id="comboDisplay">Baseline — No Appliances Active</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: QUESTIONS -->
    <div class="right-pane">
      <div class="right-inner" id="rightInner"></div>
      <div class="right-footer">
        <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
        <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">Submit Response</button>
      </div>
    </div>

  </div>

  <!-- APPLIANCE CHIPS (Drag items) -->
  <div class="appliance" id="SF"><img src="SF.png" alt="Stand Fan" /><span class="appliance-name">Stand Fan</span></div>
  <div class="appliance" id="CF"><img src="CF.png" alt="Ceiling Fan" /><span class="appliance-name">Ceiling Fan</span>
  </div>
  <div class="appliance" id="AC"><img src="AC.png" alt="Air Cooler" /><span class="appliance-name">Air Cooler</span>
  </div>
  <div class="appliance" id="WEF"><img src="WEF.png" alt="Window Fan" /><span class="appliance-name">Window Fan</span>
  </div>
  <div class="appliance" id="SEAT"><img src="SOFA.png" alt="Seat" /><span class="appliance-name">Seat</span></div>
  <div class="appliance" id="SENSOR"><img src="SENSOR.png" alt="Sensor" /><span class="appliance-name">Sensor
      (1x)</span></div>

  <script>
    // ============================================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_UwP90eokzRa8-6HOg0Y4eIzUTNtR0I0lm3hSuBfMTHyGfSqwqS4RG46gy5jeT6IH1A/exec";
    // ============================================================

    const VALID = {
      'CF': 'Combi 1 · Ceiling Fan only',
      'SF': 'Combi 2 · Stand Fan only',
      'AC-CF': 'Combi 3 · Ceiling Fan + Air Cooler',
      'AC-SF': 'Combi 4 · Stand Fan + Air Cooler',
      'AC': 'Combi 5 · Air Cooler only',
      'AC-SF-WEF': 'Combi 6 · Stand Fan + Air Cooler + Window Fan',
    };

    const MANUAL_COMBO_MAP = {
      '1 · CF only': 'Combi 1 · Ceiling Fan only',
      '2 · SF only': 'Combi 2 · Stand Fan only',
      '3 · CF + Air Cooler': 'Combi 3 · Ceiling Fan + Air Cooler',
      '4 · SF + Air Cooler': 'Combi 4 · Stand Fan + Air Cooler',
      '5 · Air Cooler': 'Combi 5 · Air Cooler only',
      '6 · SF + WEF + Air Cooler': 'Combi 6 · Stand Fan + Air Cooler + Window Fan',
    };

    const PARTIAL = new Set(['SF', 'CF', 'AC', 'AC-SF', 'AC-CF']);
    const APPLIANCE_IDS = ['SF', 'CF', 'AC', 'WEF'];
    const CONTEXT_IDS = ['SEAT', 'SENSOR'];
    const IDS = [...APPLIANCE_IDS, ...CONTEXT_IDS];

    const MANUAL_COMBO_GROUP_BY_PHASE = { during: 'd_comboManual', baseline: 'e_comboManual' };

    const placed = { SF: false, CF: false, AC: false, WEF: false, SEAT: false, SENSOR: false };
    let dragging = null, dragOffX = 0, dragOffY = 0;
    let currentPhase = null;

    const UNIT_ROOM_TYPE = {
      '#17-127': '2 Room', '#17-115': '1 Room', '#15-125': '2 Room',
      '#15-117': '1 Room', '#13-105': '2 Room', '#12-119': '2 Room',
      '#12-107': '2 Room', '#07-141': '2 Room', '#07-131': '1 Room',
      '#07-137': '1 Room', '#07-139': '1 Room', '#03-125': '2 Room',
    };

    // ---- DRAG & DROP ----
    IDS.forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('pointerdown', e => {
        if (isManualLockPhase() && APPLIANCE_IDS.includes(id) && isManualComboSelected()) {
          e.preventDefault();
          warn('Manual combination selected — reset before dragging appliances');
          updateManualAutoLockState();
          return;
        }
        e.preventDefault(); dragging = el;
        const r = el.getBoundingClientRect();
        dragOffX = e.clientX - r.left; dragOffY = e.clientY - r.top;
        el.classList.add('dragging'); el.style.zIndex = 9999;
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener('pointermove', e => {
        if (dragging !== el) return; e.preventDefault();
        el.style.left = (e.clientX - dragOffX) + 'px'; el.style.top = (e.clientY - dragOffY) + 'px';
        const wr = document.getElementById('blueprintWrap').getBoundingClientRect();
        const over = e.clientX > wr.left && e.clientX < wr.right && e.clientY > wr.top && e.clientY < wr.bottom;
        document.getElementById('blueprintWrap').classList.toggle('over-drop', over);
      });
      el.addEventListener('pointerup', e => {
        if (dragging !== el) return;
        el.classList.remove('dragging'); el.style.zIndex = 10;
        document.getElementById('blueprintWrap').classList.remove('over-drop');
        const wr = document.getElementById('blueprintWrap').getBoundingClientRect();
        const er = el.getBoundingClientRect();
        const cx = er.left + er.width / 2, cy = er.top + er.height / 2;
        if (cx > wr.left && cx < wr.right && cy > wr.top && cy < wr.bottom) tryPlace(id); else snapBack(id);
        dragging = null; updateStatus();
        syncPhaseComboUI();
      });
    });

    function tryPlace(id) {
      if (isManualLockPhase() && APPLIANCE_IDS.includes(id) && isManualComboSelected()) {
        warn('Manual combination selected — reset before dragging appliances');
        snapBack(id); updateManualAutoLockState(); return;
      }
      const next = { ...placed, [id]: true };
      if (APPLIANCE_IDS.includes(id)) {
        const activeAppliances = APPLIANCE_IDS.filter(k => next[k]).sort().join('-');
        if (id === 'WEF' && !(placed.SF && placed.AC)) { warn('WEF only valid with Stand Fan + Air Cooler'); snapBack(id); return; }
        if (id === 'CF' && placed.SF) { warn('Cannot combine Ceiling Fan and Stand Fan'); snapBack(id); return; }
        if (id === 'SF' && placed.CF) { warn('Cannot combine Stand Fan and Ceiling Fan'); snapBack(id); return; }
        if (activeAppliances !== '' && !VALID[activeAppliances] && !PARTIAL.has(activeAppliances)) { warn('Not a valid study combination'); snapBack(id); return; }
      }
      placed[id] = true; document.getElementById(id).classList.add('placed');
      syncPhaseComboUI();
    }

    function positionInSlot(id) {
      const slot = document.getElementById('slot-' + id);
      const el = document.getElementById(id);
      if (!slot || !el) return;
      const sr = slot.getBoundingClientRect();
      const sidebar = document.getElementById('sidebar');
      const sidebarRect = sidebar.getBoundingClientRect();
      el.style.left = sr.left + 'px';
      el.style.top = sr.top + 'px';
      const visible = sr.bottom > sidebarRect.top && sr.top < sidebarRect.bottom;
      if (!placed[id] && dragging !== el) { el.style.visibility = visible ? 'visible' : 'hidden'; }
    }

    function snapBack(id) {
      placed[id] = false;
      const el = document.getElementById(id);
      el.classList.remove('placed');
      el.style.visibility = 'visible';
      positionInSlot(id);
    }

    function syncSidebarComponents() {
      IDS.forEach(id => { const el = document.getElementById(id); if (!placed[id] && dragging !== el) positionInSlot(id); });
    }

    let warnTimer = null;
    function warn(msg) {
      const b = document.getElementById('comboDisplay');
      b.textContent = '⚠ ' + msg; b.className = 'combo-tag invalid';
      clearTimeout(warnTimer); warnTimer = setTimeout(updateStatus, 2800);
    }

    function updateStatus() {
      const active = APPLIANCE_IDS.filter(id => placed[id]).sort();
      const key = active.join('-');
      const b = document.getElementById('comboDisplay');
      if (!key) { b.textContent = 'Baseline — No Appliances Active'; b.className = 'combo-tag'; }
      else if (VALID[key]) { b.textContent = VALID[key]; b.className = 'combo-tag active'; }
      else { b.textContent = 'Building combination…'; b.className = 'combo-tag'; }
    }

    function getCurrentCombo() {
      const active = APPLIANCE_IDS.filter(id => placed[id]).sort().join('-');
      return VALID[active] || 'Baseline (No Appliances)';
    }

    function hasPlacedAppliance() { return APPLIANCE_IDS.some(id => placed[id]); }

    function isManualLockPhase() { return !!MANUAL_COMBO_GROUP_BY_PHASE[currentPhase]; }
    function getManualComboGroup() { return MANUAL_COMBO_GROUP_BY_PHASE[currentPhase] || null; }
    function getManualComboSelection() {
      const group = getManualComboGroup();
      return group ? getRadio(group) : '';
    }
    function isManualComboSelected() { return !!getManualComboSelection(); }

    function getEffectiveCombo() {
      const manual = getManualComboSelection();
      if (manual) return 'Manual: ' + (MANUAL_COMBO_MAP[manual] || manual);
      return getCurrentCombo();
    }

    function syncPhaseComboUI() {
      if (currentPhase === 'during') { refreshComboBanner(); }
      else if (currentPhase === 'baseline') { refreshBaselineComboBanner(); }
      if (isManualLockPhase()) updateManualAutoLockState();
    }

    function updateManualAutoLockState() {
      const group = getManualComboGroup();
      if (!group) return;
      const manualLocked = hasPlacedAppliance();
      const autoLocked = isManualComboSelected();
      document.querySelectorAll(`#rightInner .q-chip[data-group="${group}"]`).forEach(c => {
        c.classList.toggle('disabled', manualLocked);
        c.title = manualLocked ? 'Auto layout already has an appliance. Reset/remove appliances before manual selection.' : '';
      });
      APPLIANCE_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle('auto-locked', autoLocked);
        el.title = autoLocked ? 'Manual combination selected. Reset before dragging appliances.' : '';
      });
    }

    function changeLayout() {
      const v = document.getElementById('layoutSelector').value;
      document.getElementById('fp-1rm').classList.toggle('active', v === '1 Room');
      document.getElementById('fp-2rm').classList.toggle('active', v === '2 Room');
      IDS.forEach(id => snapBack(id));
      setTimeout(() => {
        IDS.forEach(id => snapBack(id));
        updateStatus();
        if (currentPhase === 'during') { updateDuringConditionalVisibility(); updateManualAutoLockState(); }
        if (currentPhase === 'baseline') { updateBaselineConditionalVisibility(); updateManualAutoLockState(); }
      }, 20);
    }

    function applyRoomTypeFromUnit() {
      const unit = document.getElementById('unitNumber').value;
      const roomType = UNIT_ROOM_TYPE[unit];
      const layoutSelector = document.getElementById('layoutSelector');
      if (!roomType || !layoutSelector) return;
      if (layoutSelector.value !== roomType) { layoutSelector.value = roomType; changeLayout(); }
      else {
        document.getElementById('fp-1rm').classList.toggle('active', roomType === '1 Room');
        document.getElementById('fp-2rm').classList.toggle('active', roomType === '2 Room');
        if (currentPhase === 'during') updateDuringConditionalVisibility();
        if (currentPhase === 'baseline') updateBaselineConditionalVisibility();
      }
    }

    function resetAll() {
      IDS.forEach(id => snapBack(id));
      setTimeout(() => { IDS.forEach(id => snapBack(id)); updateStatus(); }, 20);
      document.querySelectorAll('#rightInner .q-chip, #rightInner .tcv-chip, #rightInner .scale-chip, #rightInner .placement-chip, #rightInner .need-chip').forEach(b => b.classList.remove('sel-before', 'sel-baseline', 'sel-during', 'sel-after'));
      document.querySelectorAll('#rightInner .q-input').forEach(inp => inp.value = '');
      document.querySelectorAll('#rightInner .other-input').forEach(inp => { inp.value = ''; inp.classList.remove('visible'); });
      document.querySelectorAll('#rightInner .temp-input').forEach(inp => inp.value = '');
      if (currentPhase === 'during') { setTimeout(() => { refreshComboBanner(); updateManualAutoLockState(); }, 50); }
      if (currentPhase === 'baseline') { setTimeout(() => { refreshBaselineComboBanner(); updateBaselineConditionalVisibility(); updateManualAutoLockState(); }, 50); }
    }

    // ---- PHASE ----
    function onUnitChange() {
      document.getElementById('unitNumber').classList.remove('required');
      applyRoomTypeFromUnit();
      renderRight();
    }

    function setPhase(phase) {
      currentPhase = phase;
      document.querySelectorAll('.phase-btn').forEach(b => b.classList.toggle('active', b.dataset.phase === phase));
      renderRight();
    }

    function renderRight() {
      const unit = document.getElementById('unitNumber').value;
      const inner = document.getElementById('rightInner');
      if (!unit) { inner.innerHTML = `<div class="gate-msg"><div class="gate-icon">🏠</div><p>Please <strong>select a Unit Number</strong> above before answering questions.</p></div>`; return; }
      if (!currentPhase) { inner.innerHTML = `<div class="phase-prompt"><div class="gate-icon">📋</div><p>Select a phase above:<br><strong>Before · Baseline · During · After</strong></p></div>`; return; }
      if (currentPhase === 'before') renderBefore();
      if (currentPhase === 'baseline') renderBaseline();
      if (currentPhase === 'during') renderDuring();
      if (currentPhase === 'after') renderAfter();
    }

    // ============================================================
    // BEFORE
    // ============================================================
    function renderBefore() {
      const inner = document.getElementById('rightInner');
      inner.innerHTML = `
    <div class="q-section-header before">① Before the Experiment</div>

    <div class="q-sub-section">A · General Demographics</div>

    <div class="q-block-right">
      <div class="q-title">Age / Sex</div>
      <div class="q-pair">
        <div><div class="q-pair-label">Age</div><input class="q-input" type="number" id="b_age" placeholder="e.g. 45" min="1" max="120"/></div>
        <div><div class="q-pair-label">Sex</div><div class="q-options-grid" style="margin-top:2px;">${chip('b_sex', 'Male', 'radio')} ${chip('b_sex', 'Female', 'radio')}</div></div>
      </div>
    </div>

    <div class="q-block-right">
      <div class="q-title">Height / Weight</div>
      <div class="q-pair">
        <div><div class="q-pair-label">Height (cm)</div><input class="q-input" type="number" id="b_height" placeholder="e.g. 165"/></div>
        <div><div class="q-pair-label">Weight (kg)</div><input class="q-input" type="number" id="b_weight" placeholder="e.g. 60"/></div>
      </div>
    </div>

    <div class="q-block-right">
      <div class="q-title">No. of Occupants in Household</div>

    function isBaselineAirCoolerUsed() {
      const manual = getRadio('e_comboManual');
      return placed.AC || (manual && (manual.includes('Air Cooler') || manual === '5 · Air Cooler' || manual === '3 · CF + Air Cooler' || manual === '4 · SF + Air Cooler' || manual === '6 · SF + WEF + Air Cooler'));

    function updateBaselineConditionalVisibility() {
      if (currentPhase !== 'baseline') return;
      const isTwoRoom = document.getElementById('layoutSelector').value === '2 Room';
      const blocks = [
        { id: 'e_bedroomDoor_block', group: 'e_bedroomDoor' },
        { id: 'e_bedroomWindowTop_block', group: 'e_bedroomWindowTop' },
        { id: 'e_bedroomWindowBottom_block', group: 'e_bedroomWindowBottom' },
      ];
      blocks.forEach(item => {
        const block = document.getElementById(item.id);
        if (!block) return;
        block.style.display = isTwoRoom ? 'block' : 'none';
        if (!isTwoRoom) {
          document.querySelectorAll(`#rightInner .q-chip[data-group="${item.group}"]`).forEach(c => c.classList.remove('sel-before', 'sel-baseline', 'sel-during', 'sel-after'));
        }
      });
      // Placement block visibility
      const placementBlock = document.getElementById('e_placement_block');
      if (placementBlock) {
        const acUsed = isBaselineAirCoolerUsed();
        placementBlock.style.opacity = acUsed ? '1' : '0.55';
        placementBlock.title = acUsed ? '' : 'Enable/select an Air Cooler combination to answer this question';
        document.querySelectorAll('#rightInner .placement-chip[data-group="e_q4"]').forEach(c => {
          c.classList.toggle('disabled', !acUsed);
          if (!acUsed) c.classList.remove('sel-before', 'sel-baseline', 'sel-during', 'sel-after');
        });
        const hint = document.getElementById('e_placement_hint');
        if (hint) hint.style.display = acUsed ? 'none' : 'block';
      }
    }

    function chip(group, label, type, otherId) {
      const oa = otherId ? `data-other="${otherId}"` : '';
      return `<span class="q-chip" data-group="${group}" data-val="${label}" data-type="${type}" ${oa} onclick="toggleChip(this)">${label}</span>`;
    }

    function tcvChip2(group, num, lbl) {
      return `<div class="tcv-chip" data-group="${group}" data-val="${num}" onclick="toggleTCVGroup(this)"><span class="tcv-num">${num}</span><span class="tcv-lbl">${lbl}</span></div>`;
    }

    function scaleChip(group, num, lbl) {
      return `<div class="scale-chip" data-group="${group}" data-val="${num}" onclick="toggleScaleChip(this)"><span class="sc-num">${num}</span><span class="sc-lbl">${lbl}</span></div>`;
    }

    function tcvChipBaseline(group, num, lbl) {
      return `<div class="tcv-chip" data-group="${group}" data-val="${num}" onclick="toggleTCVGroupBaseline(this)"><span class="tcv-num">${num}</span><span class="tcv-lbl">${lbl}</span></div>`;
    }

    function scaleChipBaseline(group, num, lbl) {
      return `<div class="scale-chip" data-group="${group}" data-val="${num}" onclick="toggleScaleChipBaseline(this)"><span class="sc-num">${num}</span><span class="sc-lbl">${lbl}</span></div>`;
    }

    function needChip(num) {
      return `<div class="need-chip" data-group="d_needRating" data-val="${num}" onclick="toggleNeedChip(this)"><span class="nc-num">${num}</span></div>`;
    }

    function toggleChip(el) {
      const group = el.dataset.group, type = el.dataset.type, otherId = el.dataset.other;
      const selClass = 'sel-' + currentPhase;
      if (isManualLockPhase() && group === getManualComboGroup() && hasPlacedAppliance()) {
        warn('Auto layout already has an appliance — reset/remove appliances before manual selection');
        updateManualAutoLockState(); return;
      }
      if (el.classList.contains('disabled')) return;
      if (type === 'radio') {
        document.querySelectorAll(`#rightInner .q-chip[data-group="${group}"]`).forEach(c => {
          c.classList.remove('sel-before', 'sel-baseline', 'sel-during', 'sel-after');
          const oid = c.dataset.other; if (oid) { const oi = document.getElementById(oid); if (oi) oi.classList.remove('visible'); }
        });
        el.classList.add(selClass);
      } else {
        el.classList.toggle(selClass);
      }
      if (otherId) { const oi = document.getElementById(otherId); if (oi) oi.classList.toggle('visible', el.classList.contains(selClass)); }
      if (currentPhase === 'during' && group === 'd_comboManual') {
        refreshComboBanner(); updateDuringConditionalVisibility(); updateManualAutoLockState();
      }
      if (currentPhase === 'baseline' && group === 'e_comboManual') {
        refreshBaselineComboBanner(); updateBaselineConditionalVisibility(); updateManualAutoLockState();
      }
    }

    function toggleTCVGroup(el) {
      const group = el.dataset.group;
      document.querySelectorAll(`#rightInner .tcv-chip[data-group="${group}"]`).forEach(c => c.classList.remove('sel-before', 'sel-baseline', 'sel-during', 'sel-after'));
      el.classList.add('sel-during');
    }

    function toggleScaleChip(el) {
      const group = el.dataset.group;
      document.querySelectorAll(`#rightInner .scale-chip[data-group="${group}"]`).forEach(c => c.classList.remove('sel-before', 'sel-baseline', 'sel-during', 'sel-after'));
      el.classList.add('sel-during');
    }

    function toggleTCVGroupBaseline(el) {

    // ============================================================
    // SUBMIT
    // ============================================================
    function handleSubmit() {
      const unit = document.getElementById('unitNumber').value;
      if (!unit) { document.getElementById('unitNumber').classList.add('required'); alert('Please select a Unit Number first.'); return; }
      if (!currentPhase) { alert('Please select a phase (Before / Baseline / During / After).'); return; }

      applyRoomTypeFromUnit();
      const layout = document.getElementById('layoutSelector').value;
      const active = APPLIANCE_IDS.filter(id => placed[id]).sort().join('-');
      const combo = VALID[active] || 'Baseline (No Appliances)';
      const timestamp = new Date().toLocaleString();

      let phaseData = {};
      if (currentPhase === 'before') phaseData = collectBeforeData();
      if (currentPhase === 'baseline') phaseData = collectBaselineData();
      if (currentPhase === 'during') phaseData = collectDuringData();
      if (currentPhase === 'after') phaseData = collectAfterData();

      const payload = { timestamp, phase: currentPhase, unitNo: unit, layout, combo, ...phaseData };

      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Saving…'; btn.disabled = true;

      fetch(WEB_APP_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(() => {
          alert(`✅ Saved!\nPhase: ${currentPhase.toUpperCase()}\nUnit: ${unit}`);
          btn.textContent = 'Submit Response'; btn.disabled = false;
          resetAll();
        })
        .catch(() => {
          alert('Error saving. Check your connection.');
          btn.textContent = 'Submit Response'; btn.disabled = false;
        });
    }

        document.body.classList.remove('layout-collapsed');
        const btn = document.getElementById('mobileLayoutBtn');
        if (btn) btn.textContent = '☰ Show Layout';
        syncSidebarComponents(); return;
      }
      document.body.classList.toggle('layout-collapsed', collapsed);
      const btn = document.getElementById('mobileLayoutBtn');
      if (btn) btn.textContent = collapsed ? '☰ Show Layout' : '✕ Hide Layout';
      if (!collapsed) { setTimeout(() => { syncSidebarComponents(); updateStatus(); }, 60); }
    }

    function toggleMobileLayout() {
      if (!isPhoneWidth()) return;
      setMobileLayoutCollapsed(!document.body.classList.contains('layout-collapsed'));
    }

    // ---- INIT ----
    window.addEventListener('load', () => {
      applyRoomTypeFromUnit();
      changeLayout();
      renderRight();
      setMobileLayoutCollapsed(isPhoneWidth());

      const sidebar = document.getElementById('sidebar');
      if (sidebar) { sidebar.addEventListener('scroll', syncSidebarComponents, { passive: true }); }

      window.addEventListener('resize', () => {
        setMobileLayoutCollapsed(isPhoneWidth() ? document.body.classList.contains('layout-collapsed') : false);
        IDS.forEach(id => { if (!placed[id]) positionInSlot(id); });
        setTimeout(updateStatus, 30);
      });
    });
  </script>
</body>

</html>
